<script type="text/x-red" data-template-name="socketcan-recover">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>

    <div class="form-row">
        <label for="node-input-config"><i class="fa fa-random"></i> Config</label>
        <input type="text" id="node-input-config" placeholder="Config">
    </div>
</script>

<script type="text/x-red" data-help-name="socketcan-recover">
    <p><b>socketcan-recover</b> manually asks socketcan nodes using the selected config to stop their current socket and reconnect.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dd>Any input message starts manual recovery.</dd>
    </dl>

    <h3>Outputs</h3>
    <ol class="node-ports">
        <li>Recovery request
            <dl class="message-properties">
                <dt>socketcan <span class="property-type">object</span></dt>
                <dd>Contains interface, recoveryRequested, reason, and timestamp.</dd>
            </dl>
        </li>
    </ol>
</script>

<script type="text/javascript">
    RED.nodes.registerType('socketcan-recover',{
        category: 'network',
        color: '#bbff33',
        defaults: {
            name: {value:"socketcan-recover"},
            config: {value:"",type:"socketcan-config",required:true}
        },
        inputs:1,
        outputs:1,
        icon: "bridge.png",
        label: function() {
            return this.name || "socketcan-recover";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        }
    });
</script>
